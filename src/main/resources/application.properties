#Server
multipart.max-file-size=100Mb
multipart.max-request-size=100Mb
file.encoding=UTF-8
server.compression.enabled=true
server.compression.mime-types=text/html,text/xml,text/plain,text/css,text/javascript,application/x-javascript,application/javascript,application/json,application/manifest+json,application/xml
server.compression.min-response-size=1024
server.http2.enabled=true
#Spring
spring.servlet.multipart.file-size-threshold=2KB
spring.servlet.multipart.location=/tmp
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=75MB
spring.mvc.pathmatch.matching-strategy=ant_path_matcher
#JPA
spring.jpa.properties.hibernate.allow_update_outside_transaction=true
#Database
flyway.enabled=true
flyway.schemas=vtes_decks_v1
#Logging
logging.level.com.gargoylesoftware.htmlunit.WebClient=WARN
#Smtp
smtp.aws.enabled=false
#OpenAPI / Swagger UI
springdoc.api-docs.path=/api/api-docs
springdoc.swagger-ui.path=/api/swagger-ui.html
# Relative URLs resolve against the page URL, so one config works both locally
# (backend serves under /api) and behind the live proxy (which prepends /api).
# Setting config-url explicitly stops springdoc emitting absolute /api/... URLs.
springdoc.swagger-ui.config-url=../api-docs/swagger-config
springdoc.swagger-ui.url=../api-docs
springdoc.swagger-ui.disable-swagger-default-url=true
springdoc.paths-to-match=/api/**
springdoc.packages-to-scan=com.vtesdecks.api.controller
# Server base URL written into the spec (live value; local profile overrides)
vtesdecks.openapi.server-url=https://api.vtesdecks.com
#Scanner
scanner.baseUrl=http://vtes-scanner:5000
#Redis
spring.data.redis.database=0
spring.data.redis.host=redis
spring.data.redis.port=6379
spring.data.redis.timeout=60000